<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="weedGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
    <!-- A sharp, narrow leaflet typical of cannabis -->
    <path id="leaflet" d="M 0,0 C -18,-30 -12,-90 0,-120 C 12,-90 18,-30 0,0 Z" />
  </defs>
  
  <g transform="translate(100, 165)" fill="url(#weedGrad)">
    <!-- Stem -->
    <path d="M -3,0 Q -4,20 -8,35 L 8,35 Q 4,20 3,0 Z" />
    
    <!-- Center leaflet -->
    <use href="#leaflet" transform="scale(1.05)" />
    
    <!-- Upper side leaflets -->
    <use href="#leaflet" transform="rotate(35) scale(0.9)" />
    <use href="#leaflet" transform="rotate(-35) scale(0.9)" />
    
    <!-- Middle side leaflets -->
    <use href="#leaflet" transform="rotate(65) scale(0.7)" />
    <use href="#leaflet" transform="rotate(-65) scale(0.7)" />
    
    <!-- Lower side leaflets -->
    <use href="#leaflet" transform="rotate(95) scale(0.45)" />
    <use href="#leaflet" transform="rotate(-95) scale(0.45)" />
    
    <!-- Lowest tiny pair -->
    <use href="#leaflet" transform="rotate(120) scale(0.25)" />
    <use href="#leaflet" transform="rotate(-120) scale(0.25)" />
  </g>
</svg>